<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Khách hàng - Fashy Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <h2>ĐĂNG NHẬP KHÁCH HÀNG</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Chào mừng bạn quay trở lại với Fashy</p>

        <form action="/login" method="POST">
            <div class="input-group">
                <i class="fa-solid fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Tên đăng nhập" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>

            <button type="submit" class="btn-auth">
                ĐĂNG NHẬP <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p>Chưa có tài khoản? <a href="/register" style="color: #3b82f6; font-weight: 600;">Đăng ký ngay</a></p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">

            <a href="{{ url_for('home') }}" class="back-home-link">
                <i class="fa-solid fa-arrow-left"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</div>

</body>
</html>
