<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Nội bộ - Fashy Logistics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="auth-container internal-bg">
    <div class="auth-card">
        <div class="internal-badge">HỆ THỐNG QUẢN TRỊ</div>

        <h2 style="margin-bottom: 10px;">ĐĂNG NHẬP</h2>
        <p style="color: #64748b; font-size: 14px; margin-bottom: 25px;">Vui lòng chọn đúng khu vực làm việc</p>

        <form action="/internal/login" method="POST">
            <div class="input-group">
                <i class="fa-solid fa-map-location-dot input-icon"></i>
                <select name="region" required>
                    <option value="" disabled selected>-- Chọn miền làm việc --</option>
                    <option value="North">Bưu cục Miền Bắc (Database North)</option>
                    <option value="Central">Bưu cục Miền Trung (Database Central)</option>
                    <option value="South">Bưu cục Miền Nam (Database South)</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-user-tie input-icon"></i>
                <input type="text" name="username" placeholder="Mã nhân viên" required>
            </div>

            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>

            <button type="submit" class="btn-auth btn-internal">
                VÀO HỆ THỐNG <i class="fa-solid fa-right-to-bracket" style="margin-left: 8px;"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p style="margin-bottom: 10px; font-style: italic;">Dành riêng cho Admin, Kho và Shipper</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 15px;">
            <a href="{{ url_for('home') }}" class="back-home-link">
                <i class="fa-solid fa-house"></i> Quay lại trang chủ
            </a>
        </div>
    </div>
</div>
</body>
</html>
